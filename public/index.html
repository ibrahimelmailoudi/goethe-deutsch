    />

    <!-- Apple Touch Icon -->
    <link
      rel="apple-touch-icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%234f46e5'/%3E%3Cstop offset='100%25' stop-color='%237c3aed'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='180' height='180' rx='40' fill='url(%23g)'/%3E%3Ctext x='90' y='130' font-size='100' text-anchor='middle' font-family='Georgia,serif' font-weight='bold' fill='white'%3EG%3C/text%3E%3C/svg%3E"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4f46e5" />

    <!-- SEO & PWA -->
    <meta name="description" content="Goethe Deutsch Lernapp – A1 bis C1. Grammatik, Übungen, Prüfungen und Videos." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Goethe Deutsch" />

    <title>Goethe Deutsch – A1 bis C1</title>

    <style>
      /* Prevent flash of unstyled content */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: #0f172a;
        color: #f1f5f9;
      }
      #root { min-height: 100vh; }

      /* Loading spinner shown before React mounts */
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        gap: 20px;
        z-index: 9999;
      }
      #app-loading .logo {
        width: 72px; height: 72px;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        border-radius: 18px;
        display: flex; align-items: center; justify-content: center;
        font-size: 2.2em; font-family: Georgia, serif; font-weight: bold;
        color: white;
        box-shadow: 0 12px 32px rgba(79,70,229,0.5);
        animation: pulse 1.5s ease-in-out infinite;
      }
      #app-loading p {
        color: #94a3b8; font-size: 0.95em; letter-spacing: 0.05em;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 12px 32px rgba(79,70,229,0.5); }
        50%       { transform: scale(1.06); box-shadow: 0 16px 40px rgba(79,70,229,0.7); }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .spinner {
        width: 28px; height: 28px;
        border: 3px solid #334155;
        border-top-color: #818cf8;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
    </style>
  </head>

  <body>
    <!-- Loading screen (hidden once React mounts) -->
    <div id="app-loading">
      <div class="logo">G</div>
      <p>Goethe Deutsch wird geladen…</p>
      <div class="spinner"></div>
    </div>

    <!-- React root -->
    <div id="root"></div>

    <script>
      // Hide loading screen as soon as React renders something
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const el = document.getElementById('app-loading');
          if (el) el.style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
</html>
